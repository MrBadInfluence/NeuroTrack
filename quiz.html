<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroTrack – Codebase Quiz</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo-50:  #eef2ff;
      --indigo-100: #e0e7ff;
      --indigo-400: #818cf8;
      --indigo-500: #6366f1;
      --indigo-600: #4f46e5;
      --indigo-700: #4338ca;
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --amber-400:  #fbbf24;
      --amber-500:  #f59e0b;
      --rose-400:   #fb7185;
      --rose-500:   #f43f5e;
      --slate-50:   #f8fafc;
      --slate-100:  #f1f5f9;
      --slate-200:  #e2e8f0;
      --slate-300:  #cbd5e1;
      --slate-400:  #94a3b8;
      --slate-600:  #475569;
      --slate-700:  #334155;
      --slate-800:  #1e293b;
      --slate-900:  #0f172a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--slate-900) 0%, #1a1040 50%, var(--slate-900) 100%);
      min-height: 100vh;
      color: var(--slate-100);
      line-height: 1.6;
    }

    #root { min-height: 100vh; }

    /* ── Layout ── */
    .page { max-width: 760px; margin: 0 auto; padding: 32px 16px 64px; }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(99,102,241,.2);
      border: 1px solid rgba(99,102,241,.4);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--indigo-400);
      margin-bottom: 16px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .header h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, var(--indigo-400) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .header p {
      color: var(--slate-400);
      font-size: 15px;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      margin-bottom: 28px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--slate-400);
      margin-bottom: 8px;
    }
    .progress-track {
      height: 6px;
      background: rgba(255,255,255,.1);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--indigo-500), var(--indigo-400));
      transition: width .4s ease;
    }

    /* ── Score strip ── */
    .score-strip {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .score-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
    }
    .score-pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .dot-correct  { background: var(--emerald-500); }
    .dot-wrong    { background: var(--rose-500); }
    .dot-pending  { background: var(--slate-400); }

    /* ── Category tag ── */
    .category-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 3px 8px;
      margin-bottom: 12px;
    }

    /* ── Question card ── */
    .card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      backdrop-filter: blur(12px);
      transition: border-color .2s;
    }
    .card:hover { border-color: rgba(99,102,241,.35); }

    .question-number {
      font-size: 12px;
      font-weight: 600;
      color: var(--slate-400);
      margin-bottom: 8px;
    }
    .question-text {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 20px;
    }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: 13px 16px;
      text-align: left;
      cursor: pointer;
      color: var(--slate-200);
      font-size: 15px;
      font-family: inherit;
      transition: all .15s ease;
      width: 100%;
    }
    .option-btn:hover:not(:disabled) {
      background: rgba(99,102,241,.15);
      border-color: var(--indigo-500);
      color: #fff;
    }
    .option-btn:disabled { cursor: default; }

    .option-btn.correct {
      background: rgba(16,185,129,.15);
      border-color: var(--emerald-500);
      color: #fff;
    }
    .option-btn.wrong {
      background: rgba(244,63,94,.12);
      border-color: var(--rose-500);
      color: #fff;
    }
    .option-btn.revealed {
      background: rgba(16,185,129,.08);
      border-color: rgba(16,185,129,.4);
      color: var(--emerald-400);
    }

    .option-letter {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .correct  .option-letter { background: var(--emerald-500); color: #fff; }
    .wrong    .option-letter { background: var(--rose-500);    color: #fff; }
    .revealed .option-letter { background: rgba(16,185,129,.3); color: var(--emerald-400); }

    /* ── Explanation ── */
    .explanation {
      margin-top: 14px;
      padding: 12px 16px;
      background: rgba(99,102,241,.1);
      border-left: 3px solid var(--indigo-500);
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      color: var(--slate-300);
      animation: fadeIn .3s ease;
    }
    .explanation strong { color: var(--indigo-400); }

    /* ── Code snippet ── */
    .code-hint {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--emerald-400);
      margin: 12px 0;
      overflow-x: auto;
      white-space: pre;
    }

    /* ── Navigation ── */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s ease;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--indigo-600), var(--indigo-500));
      color: #fff;
      box-shadow: 0 4px 14px rgba(99,102,241,.35);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(99,102,241,.45); }
    .btn-ghost {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--slate-300);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.1); color: #fff; }
    .btn:disabled { opacity: .4; cursor: default; transform: none !important; }

    /* ── Results ── */
    .results-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 40px 28px;
      text-align: center;
      backdrop-filter: blur(12px);
    }
    .results-emoji { font-size: 56px; margin-bottom: 16px; }
    .results-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #fff;
    }
    .results-subtitle {
      color: var(--slate-400);
      font-size: 15px;
      margin-bottom: 32px;
    }
    .score-big {
      font-size: 64px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--indigo-400), var(--emerald-400));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 4px;
    }
    .score-label { color: var(--slate-400); font-size: 14px; margin-bottom: 32px; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .results-stat {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 16px;
    }
    .results-stat .val {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
    }
    .results-stat .lbl {
      font-size: 12px;
      color: var(--slate-400);
      margin-top: 2px;
    }
    .correct-val  { color: var(--emerald-400) !important; }
    .wrong-val    { color: var(--rose-400) !important; }

    .category-breakdown {
      text-align: left;
      margin-bottom: 32px;
    }
    .breakdown-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--slate-400);
      margin-bottom: 12px;
    }
    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: 14px;
    }
    .breakdown-bar-wrap {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      margin: 0 12px;
      overflow: hidden;
    }
    .breakdown-bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--indigo-500), var(--indigo-400));
      transition: width .6s ease;
    }
    .breakdown-score { font-weight: 700; min-width: 40px; text-align: right; font-size: 13px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Splash/start screen ── */
    .splash {
      text-align: center;
      padding: 40px 0;
    }
    .splash-icon {
      width: 80px; height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, var(--indigo-600), var(--indigo-400));
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(99,102,241,.4);
    }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 28px 0 36px;
      text-align: left;
    }
    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 14px;
    }
    .feature-icon { font-size: 20px; flex-shrink: 0; }
    .feature-text { font-size: 13px; color: var(--slate-300); }
    .feature-text strong { display: block; color: #fff; margin-bottom: 2px; font-size: 14px; }

    @media (max-width: 480px) {
      .feature-grid { grid-template-columns: 1fr; }
      .results-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .card { padding: 20px 16px; }
    }
  </style>
</head>

/* ──────────────────────────────────────────
   HELPERS
────────────────────────────────────────── */
const LETTERS = ['A', 'B', 'C', 'D'];

function categoryStats(questions, answers) {
  const map = {};
  questions.forEach(q => {
    if (!map[q.category]) map[q.category] = { total: 0, correct: 0, color: q.categoryColor };
    map[q.category].total++;
    if (answers[q.id] === q.answer) map[q.category].correct++;
  });
  return map;
}

function gradeInfo(pct) {
  if (pct >= 90) return { emoji: '🏆', title: 'Expert!', sub: 'You know NeuroTrack inside-out.' };
  if (pct >= 70) return { emoji: '🎯', title: 'Impressive!', sub: 'Strong grasp of the codebase.' };
  if (pct >= 50) return { emoji: '📚', title: 'Getting There', sub: 'A few more read-throughs and you\'ll ace it.' };
  return { emoji: '🔍', title: 'Keep Exploring', sub: 'Dig deeper into the source files!' };
}

/* ──────────────────────────────────────────
   COMPONENTS
────────────────────────────────────────── */
function CategoryTag({ label, color }) {
  return (
    <span className="category-tag" style={{ background: color + '22', color, border: `1px solid ${color}44` }}>
      {label}
    </span>
  );
}

function QuestionCard({ question, selectedAnswer, onSelect }) {
  const answered = selectedAnswer !== null && selectedAnswer !== undefined;

  return (
    <div className="card">
      <CategoryTag label={question.category} color={question.categoryColor} />
      <div className="question-number">Question {question.id} of {QUESTIONS.length}</div>
      <div className="question-text">{question.text}</div>

      <div className="options">
        {question.options.map((opt, i) => {
          let cls = 'option-btn';
          if (answered) {
            if (i === question.answer) cls += ' correct';
            else if (i === selectedAnswer) cls += ' wrong';
          }
          return (
            <button
              key={i}
              className={cls}
              onClick={() => !answered && onSelect(i)}
              disabled={answered}
            >
              <span className="option-letter">{LETTERS[i]}</span>
              <span>{opt}</span>
            </button>
          );
        })}
      </div>

      {answered && (
        <div
          className="explanation"
          dangerouslySetInnerHTML={{ __html: question.explanation }}
        />
      )}
    </div>
  );
}

function StartScreen({ onStart }) {
  return (
    <div className="splash">
      <div className="splash-icon">🧠</div>
      <h2 style={{ fontSize: 26, fontWeight: 800, marginBottom: 8 }}>NeuroTrack Codebase Quiz</h2>
      <p style={{ color: 'var(--slate-400)', fontSize: 15, maxWidth: 480, margin: '0 auto 24px' }}>
        Test your knowledge of the NeuroTrack React Native app — from architecture and data models
        to components, navigation, and storage strategy.
      </p>

      <div className="feature-grid">
        {[
          ['🏗️', 'Architecture', '25 questions across 8 categories'],
          ['💊', 'Features', 'Seizures, Meds, Reminders & more'],
          ['🗄️', 'Data Models', 'Supabase schema & AsyncStorage'],
          ['🎨', 'Components', 'UI building blocks & navigation'],
        ].map(([icon, title, desc]) => (
          <div className="feature-item" key={title}>
            <span className="feature-icon">{icon}</span>
            <span className="feature-text">
              <strong>{title}</strong>{desc}
            </span>
          </div>
        ))}
      </div>

      <button className="btn btn-primary" onClick={onStart} style={{ fontSize: 16, padding: '14px 36px' }}>
        Start Quiz →
      </button>
    </div>
  );
}

function ResultsScreen({ answers, onRestart }) {
  const total   = QUESTIONS.length;
  const correct = QUESTIONS.filter(q => answers[q.id] === q.answer).length;
  const wrong   = Object.keys(answers).length - correct;
  const pct     = Math.round((correct / total) * 100);
  const grade   = gradeInfo(pct);
  const cats    = categoryStats(QUESTIONS, answers);

  return (
    <div className="results-card">
      <div className="results-emoji">{grade.emoji}</div>
      <div className="results-title">{grade.title}</div>
      <div className="results-subtitle">{grade.sub}</div>

      <div className="score-big">{pct}%</div>
      <div className="score-label">Overall Score</div>

      <div className="results-grid">
        <div className="results-stat">
          <div className="val correct-val">{correct}</div>
          <div className="lbl">Correct</div>
        </div>
        <div className="results-stat">
          <div className="val wrong-val">{wrong}</div>
          <div className="lbl">Wrong</div>
        </div>
        <div className="results-stat">
          <div className="val">{total}</div>
          <div className="lbl">Total</div>
        </div>
      </div>

      <div className="category-breakdown">
        <div class="breakdown-title">Score by Category</div>
        {Object.entries(cats).map(([cat, { total: t, correct: c, color }]) => (
          <div className="breakdown-row" key={cat}>
            <span style={{ color, fontWeight: 600, fontSize: 13, minWidth: 130 }}>{cat}</span>
            <div className="breakdown-bar-wrap">
              <div className="breakdown-bar" style={{ width: `${Math.round((c / t) * 100)}%`, background: `linear-gradient(90deg, ${color}, ${color}99)` }} />
            </div>
            <span className="breakdown-score" style={{ color }}>{c}/{t}</span>
          </div>
        ))}
      </div>

      <button className="btn btn-primary" onClick={onRestart} style={{ fontSize: 15, padding: '13px 32px' }}>
        Retake Quiz
      </button>
    </div>
  );
}

/* ──────────────────────────────────────────
   MAIN APP
────────────────────────────────────────── */
function App() {
  const [stage, setStage]       = useState('start'); // start | quiz | results
  const [current, setCurrent]   = useState(0);
  const [answers, setAnswers]   = useState({});

  const question = QUESTIONS[current];
  const answered = answers[question?.id] !== undefined;

  const handleSelect = useCallback((optionIndex) => {
    setAnswers(prev => ({ ...prev, [question.id]: optionIndex }));
  }, [question]);

  const handleNext = () => {
    if (current < QUESTIONS.length - 1) setCurrent(c => c + 1);
    else setStage('results');
  };

  const handlePrev = () => {
    if (current > 0) setCurrent(c => c - 1);
  };

  const handleRestart = () => {
    setAnswers({});
    setCurrent(0);
    setStage('start');
  };

  const correctSoFar = QUESTIONS.slice(0, current + 1).filter(q => answers[q.id] === q.answer).length;
  const answeredCount = Object.keys(answers).length;

  return (
    <div className="page">
      <div className="header">
        <div className="header-badge">🧠 NeuroTrack</div>
        <h1>Codebase Quiz</h1>
        <p>How well do you know the architecture, data models, and features?</p>
      </div>

      {stage === 'start' && <StartScreen onStart={() => setStage('quiz')} />}

      {stage === 'quiz' && (
        <>
          <div className="progress-wrap">
            <div className="progress-meta">
              <span>Question {current + 1} of {QUESTIONS.length}</span>
              <span>{answeredCount} answered</span>
            </div>
            <div className="progress-track">
              <div className="progress-fill" style={{ width: `${((current + 1) / QUESTIONS.length) * 100}%` }} />
            </div>
          </div>

          <div className="score-strip">
            <div className="score-pill">
              <span className="dot dot-correct" />
              {correctSoFar} Correct
            </div>
            <div className="score-pill">
              <span className="dot dot-wrong" />
              {answeredCount - correctSoFar} Wrong
            </div>
            <div className="score-pill">
              <span className="dot dot-pending" />
              {QUESTIONS.length - answeredCount} Remaining
            </div>
          </div>

          <QuestionCard
            question={question}
            selectedAnswer={answers[question.id]}
            onSelect={handleSelect}
          />

          <div className="nav-row">
            <button className="btn btn-ghost" onClick={handlePrev} disabled={current === 0}>
              ← Previous
            </button>
            <button
              className="btn btn-primary"
              onClick={handleNext}
              disabled={!answered}
            >
              {current === QUESTIONS.length - 1 ? 'See Results 🏁' : 'Next →'}
            </button>
          </div>
        </>
      )}

      {stage === 'results' && (
        <ResultsScreen answers={answers} onRestart={handleRestart} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
